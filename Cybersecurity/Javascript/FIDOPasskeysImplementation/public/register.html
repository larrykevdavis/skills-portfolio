<!DOCTYPE html>
<html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
<body>

    
    <div class="card">
        <div class="card-body">
            <h4>Welcome to Bubble - A Sample Passwordless System using FIDO2</h4>
                <span id="regLog"></span>
                <div class="form-group">
                    <label for="exampleInputEmail1">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
                    <small id="emailHelp" class="form-text text-muted">This is a Passwordless Signup</small>
                </div>
                <button type="click" class="btn btn-primary" onclick="register()">Register A PassKey</button>
                <hr>
            <h5><a href="/login">Already Registered a PassKey? Login</a></h5>
        </div>

    </div>

<script>
function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    return Uint8Array.from(binary, c => c.charCodeAt(0));
}


async function register() {
    const username=document.getElementById('exampleInputEmail1').value;
    const url='http://localhost:3000/register-passkey?username='+username

    const res = await fetch(url);
    const options = await res.json();

    // Convert base64 → ArrayBuffer
    options.challenge = base64ToArrayBuffer(options.challenge);
    options.user.id = base64ToArrayBuffer(options.user.id);


    try {
        const credential = await navigator.credentials.create({
            publicKey: options
        });

        console.log('SUCCESS', credential);
        document.getElementById('regLog').innerHTML='Passkey Credential Has been Registered'
        document.getElementById('regLog').style.color="green"
        // Saving the credential as session storage
        sessionStorage.setItem("lastname", JSON.stringify(credential));


    } catch (err) {
        console.error('FAIL', err);
        document.getElementById('regLog').innerHTML='Passkey Credential Was not Registered'
        document.getElementById('regLog').style.color="red"
    }
}

</script>

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
<script>

</script>
</body>
</html>
