<!DOCTYPE html>
<html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
<body>

	
	<div class="card">
		<div class="card-body">
			<h4>Welcome to Bubble - A Sample Passwordless System using FIDO2</h4>
			<p id="regLog"></p>
    			<div class="form-group">
    				<label for="exampleInputEmail1">Email address</label>
    				<input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
    				<small id="emailHelp" class="form-text text-muted">This is a Passwordless Login</small>
    			</div>
  				<button type="submit" class="btn btn-primary" onclick="login()">Login With A PassKey</button>
			
		</div>
	</div>


<script>
	function base64ToArrayBuffer(base64) {
    	const binary = atob(base64);
    	return Uint8Array.from(binary, c => c.charCodeAt(0));
	}

	async function login() {

    const username = document.getElementById('exampleInputEmail1').value;

    const stored = sessionStorage.getItem(username);

    if (!stored) {
        alert('No credential found. Please register first.');
        return;
    }

    const credential = JSON.parse(stored);

    try {

        const res = await fetch('http://localhost:3000/authenticate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(credential)
        });

        const result = await res.json();

        if (result.success) {
            document.getElementById('regLog').innerHTML = 'Login Successful';
            alert("Login Successful")
            document.getElementById('regLog').style.color = "green";
        } else {
            document.getElementById('regLog').innerHTML = 'Login Failed';
            document.getElementById('regLog').style.color = "red";
        }

    } catch (err) {
        console.error(err);

        document.getElementById('regLog').innerHTML = 'Login Failed';
        document.getElementById('regLog').style.color = "red";
    }
}



</script>

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>

</script>
</body>
</html>
